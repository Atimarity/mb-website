<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>
  <h1>Register</h1>
  <form id="form" action="/register" method="POST">
    <label>Username: <input id="username" type="text" name="username" required></label><br>
    <label>Password: <input id="password" type="password" name="password" required></label><br>
    <label>Birthdate: <input id="birthdate" type="date" name="birthdate" required></label><br>
    <button type="submit">Register</button>
    <label id="message"></label>
  </form>
  <p>Already have an account? <a href="/signin">Sign in</a></p>
</body>
</html>

);

const form = document.getElementById("form");
const message = document.getElementById("message");


form.addEventListener("submit", async (e) => { e.preventDefault()

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const birthdate = document.getElementById("birthdate").value;

if (error){

}
else{
